{% extends "base.html" %}

{% block title %}เข้าสู่ระบบ - TikTok 4K Downloader{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card-custom">
            <h3 class="text-center mb-4">
                <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ
            </h3>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username หรือ Email</label>
                    <input type="text" id="username" class="form-control" placeholder="username หรือ email" required>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">รหัสผ่าน</label>
                    <input type="password" id="password" class="form-control" placeholder="รหัสผ่าน" required>
                </div>
                
                <div class="mb-3 form-check">
                    <input type="checkbox" id="remember" class="form-check-input">
                    <label class="form-check-label" for="remember">จดจำฉัน</label>
                </div>
                
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ
                </button>
            </form>
            
            <div class="text-center mt-3">
                <a href="{{ url_for('auth.register') }}">ยังไม่มีบัญชี? ลงทะเบียน</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังเข้าสู่ระบบ...';
    
    try {
        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                remember: document.getElementById('remember').checked
            })
        });
        
        const data = await response.json();
        
        if (data.success) {
            await Swal.fire('สำเร็จ!', 'เข้าสู่ระบบเรียบร้อย', 'success');
            window.location.href = data.redirect || '/dashboard';
        } else {
            await Swal.fire('Error!', data.error || 'Login failed', 'error');
        }
    } catch (error) {
        await Swal.fire('Error!', error.message, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ';
    }
});
</script>
{% endblock %}
